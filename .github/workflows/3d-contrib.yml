name: Generate 3D contribution graph

on:
  schedule:
    - cron: "0 1 * * *"   # tous les jours à 1h UTC
  workflow_dispatch:        # bouton "Run workflow" manuel

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate 3D contribution SVGs
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          USERNAME: ${{ github.repository_owner }}

      - name: Commit & push the generated SVGs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A profile-3d-contrib
          git commit -m "chore: regenerate 3D contribution graph" || echo "Nothing to commit"
          git push
